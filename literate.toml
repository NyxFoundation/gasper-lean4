# ── Force light theme on all platforms ───────────────────────────────
# Force light theme on all platforms.
# Verso's built-in literate.css overrides --verso-* variables under
# @media (prefers-color-scheme: dark). We reset them here to the light
# values so that the site always renders in light mode, regardless of OS
# preference. Key names are the variable names with "--verso-" removed
# and hyphens replaced by underscores.
[theme.dark]
text_color = "#333"
structure_color = "#333"
background_color = "#ffffff"
surface_color = "#f8f9fa"
border_color = "#e9ecef"
link_color = "#0066cc"
