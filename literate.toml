inline_code_bg = "#f0f2f4"
docstring_border_color = "#ddd"
imports_summary_color = "#586069"
output_color = "#555"
copy_button_bg = "#e9ecef"
copy_button_border = "#d1d5db"
copy_button_color = "#586069"
copy_button_hover_bg = "#d1d5db"
copy_button_copied_color = "#22863a"
