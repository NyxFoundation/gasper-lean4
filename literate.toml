landing_page = "GasperBeaconChain"
exclude = ["GasperBeaconChain.Core.All", "GasperBeaconChain.Basic"]
order = [
  "GasperBeaconChain.Core.AtomicDef",
  "GasperBeaconChain.Core.Lemmas",
  "GasperBeaconChain.Core.Theories"
]

show_imports = false
docstrings_as_text = true

show_output = ["#eval", "#check", "#print", "#reduce", "#explode", "#detail_explode"]

hide_commands = ["namespace", "universe", "set_option", "end"]

extra_css = ["static/katex/katex.css", "static/custom-force-style.css"]
extra_js  = ["static/katex/katex.js", "static/math.js", "static/render-plugins.js", "static/diagram-hover.js", "static/diagram-view.js", "static/custom-style.js"]


[metadata]
title = "Formal Verification of Gasper in Lean 4"
description = "Lean 4 formalization of Gasper: safety, liveness, and slashable bounds for the Beacon Chain."

