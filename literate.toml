landing_page = "GasperBeaconChain"
exclude = ["GasperBeaconChain.Core.All", "GasperBeaconChain.Basic"]
order = [
  "GasperBeaconChain.Core.AtomicDef",
  "GasperBeaconChain.Core.Lemmas",
  "GasperBeaconChain.Core.Theories"
]

show_imports = false
docstrings_as_text = true

show_output = ["#eval", "#check", "#print", "#reduce", "#explode", "set_option"]

hide_commands = ["namespace", "universe", "end"]

extra_css = ["static/katex/katex.css", "static/custom-force-style.css"]
extra_js  = ["static/katex/katex.js", "static/math.js", "static/render-plugins.js", "static/diagram-hover.js", "static/diagram-view.js", "static/custom-style.js"]


[metadata]
title = "Formal Verification of Gasper in Lean 4"
description = "Machine-checked proofs of Casper FFG accountable safety, plausible liveness, and the slashable bound for the Beacon Chain consensus protocol."

# Force light theme on all platforms.
# Verso's built-in literate.css overrides --verso-* variables under
# @media (prefers-color-scheme: dark). We reset them here to the light
# values so that the site always renders in light mode, regardless of OS
# preference. Key names are the variable names with "--verso-" removed
# and hyphens replaced by underscores.
[theme.dark]
text_color = "#333"
structure_color = "#333"
background_color = "#ffffff"
surface_color = "#f8f9fa"
border_color = "#e9ecef"
link_color = "#0066cc"
link_visited_color = "#551a8b"
link_hover_bg = "#e3f2fd"
muted_color = "#6c757d"
current_bg = "#0066cc"
current_fg = "white"
breadcrumb_color = "#495057"
code_box_background_color = "#f6f8fa"
code_box_border_color = "#e1e4e8"
blockquote_border_color = "#dfe2e5"
blockquote_color = "#6a737d"
inline_code_bg = "#f0f2f4"
docstring_border_color = "#ddd"
imports_summary_color = "#586069"
output_color = "#555"
copy_button_bg = "#e9ecef"
copy_button_border = "#d1d5db"
copy_button_color = "#586069"
copy_button_hover_bg = "#d1d5db"
copy_button_copied_color = "#22863a"
hamburger_bg = "#fff"
hamburger_border = "#dee2e6"
hamburger_bar_color = "#333"
warning_color = "#fff3cd"
error_color = "#cc0000"
warning_indicator_color = "#b8860b"
error_indicator_color = "#dc3545"
info_indicator_color = "#0066cc"
