name: Deploy Verso Literate to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false

      - name: Build literate site
        id: build
        run: echo "path=$(lake query :literateHtml)" >> "$GITHUB_OUTPUT"

      - name: Prepare site
        run: |
          cp -r static/katex/fonts "${{ steps.build.outputs.path }}/"
          touch "${{ steps.build.outputs.path }}/.nojekyll"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ steps.build.outputs.path }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
